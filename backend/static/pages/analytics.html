<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - NHRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/static/pages/dashboard.html"><i class="bi bi-people-fill me-2"></i>NHRMS</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="userDisplay"></span>
                <a href="/static/pages/dashboard.html" class="btn btn-outline-light btn-sm me-2"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid bg-dark text-white py-3">
        <div class="container">
            <h5 class="mb-0"><i class="bi bi-graph-up me-2"></i>Analytics Dashboard</h5>
        </div>
    </div>

    <div class="container mt-4">
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-primary text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-people fs-2"></i>
                        <h3 id="totalEmployees">0</h3>
                        <small>Total Employees</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-success text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-building fs-2"></i>
                        <h3 id="totalDepartments">0</h3>
                        <small>Departments</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-warning text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-currency-dollar fs-2"></i>
                        <h3 id="avgSalary">$0</h3>
                        <small>Avg Salary</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-info text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-person-check fs-2"></i>
                        <h3 id="activeEmployees">0</h3>
                        <small>Active</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h6 class="mb-0"><i class="bi bi-bar-chart me-2"></i>Employees by Department</h6>
                    </div>
                    <div class="card-body">
                        <canvas id="deptChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h6 class="mb-0"><i class="bi bi-pie-chart me-2"></i>Employment Status</h6>
                    </div>
                    <div class="card-body">
                        <canvas id="statusChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h6 class="mb-0"><i class="bi bi-graph-up me-2"></i>Hiring Trends</h6>
                    </div>
                    <div class="card-body">
                        <canvas id="hiringChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h6 class="mb-0"><i class="bi bi-currency-dollar me-2"></i>Salary Distribution</h6>
                    </div>
                    <div class="card-body">
                        <canvas id="salaryChart" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/analytics.js"></script>
</body>
</html>
