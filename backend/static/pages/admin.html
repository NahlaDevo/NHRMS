<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - NHRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/static/pages/dashboard.html"><i class="bi bi-shield-lock me-2"></i>Admin Panel</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="userDisplay"></span>
                <a href="/static/pages/dashboard.html" class="btn btn-outline-light btn-sm me-2"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <ul class="nav nav-tabs mb-4" id="adminTabs">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#usersTab"><i class="bi bi-people me-1"></i>User Management</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#auditTab"><i class="bi bi-journal-text me-1"></i>Audit Logs</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#exportTab"><i class="bi bi-download me-1"></i>Export</a></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="usersTab">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h6 class="mb-0"><i class="bi bi-people me-2"></i>Registered Users</h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Username</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTableBody">
                                    <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="auditTab">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h6 class="mb-0"><i class="bi bi-journal-text me-2"></i>Activity Log</h6>
                        <button class="btn btn-sm btn-outline-primary" onclick="loadAuditLogs()"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
                    </div>
                    <div class="card-body" style="max-height:500px;overflow-y:auto;">
                        <pre id="auditLogContent" class="mb-0" style="font-size:0.85rem;">Loading...</pre>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="exportTab">
                <div class="card shadow-sm border-0">
                    <div class="card-body text-center p-5">
                        <i class="bi bi-file-earmark-excel fs-1 text-success"></i>
                        <h5 class="mt-3">Export Employee Records</h5>
                        <p class="text-muted">Download all employee records as an Excel spreadsheet.</p>
                        <button class="btn btn-success btn-lg" onclick="exportExcel()">
                            <i class="bi bi-download me-2"></i>Download Excel Report
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
