<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Form - NHRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/static/pages/dashboard.html"><i class="bi bi-people-fill me-2"></i>NHRMS</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="userDisplay"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid bg-dark text-white py-3">
        <div class="container">
            <h5 class="mb-0"><i class="bi bi-person-plus me-2"></i>Employee Information Form</h5>
        </div>
    </div>

    <div class="container mt-4">
        <div id="errorMsg" class="alert alert-danger d-none"></div>
        <div id="successMsg" class="alert alert-success d-none"></div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form id="employeeForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Employee ID <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="employee_id" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="full_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Department <span class="text-danger">*</span></label>
                            <select class="form-select" id="department" required>
                                <option value="">Select Department</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Sales">Sales</option>
                                <option value="Human Resources">Human Resources</option>
                                <option value="Finance">Finance</option>
                                <option value="Operations">Operations</option>
                                <option value="Legal">Legal</option>
                                <option value="IT">IT</option>
                                <option value="Research & Development">Research & Development</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Position <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="position" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="phone_number" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" id="address" rows="2"></textarea>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">National ID / Passport</label>
                            <input type="text" class="form-control" id="national_id">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Hiring Date</label>
                            <input type="date" class="form-control" id="hiring_date">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Salary</label>
                            <input type="number" class="form-control" id="salary" step="0.01">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Employment Status</label>
                            <select class="form-select" id="employment_status">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                                <option value="Terminated">Terminated</option>
                                <option value="On Leave">On Leave</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Manager Name</label>
                            <input type="text" class="form-control" id="manager_name">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Emergency Contact</label>
                            <input type="text" class="form-control" id="emergency_contact">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Notes / Comments</label>
                            <textarea class="form-control" id="notes" rows="3"></textarea>
                        </div>
                    </div>
                    <input type="hidden" id="isEdit" value="false">
                    <input type="hidden" id="editId" value="">
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4" id="submitBtn"><i class="bi bi-save me-2"></i>Submit Record</button>
                        <button type="reset" class="btn btn-secondary px-4"><i class="bi bi-arrow-counterclockwise me-2"></i>Reset</button>
                        <a href="/static/pages/dashboard.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Back to Dashboard</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/employee-form.js"></script>
</body>
</html>
