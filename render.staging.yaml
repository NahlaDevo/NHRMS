databases:
  - name: nhrms-db-staging
    databaseName: nhrms_staging
    user: nhrms
    plan: free
    region: ohio
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: nhrms-api-staging
    runtime: python
    region: ohio
    plan: starter
    branch: develop
    buildCommand: pip install -r backend/requirements.txt
    startCommand: >
      alembic upgrade head &&
      uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT --workers ${UVICORN_WORKERS:-2} --limit-max-requests 10000 --timeout-keep-alive 65
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nhrms-db-staging
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DEBUG
        value: "true"
      - key: REDIS_URL
        value: ""
      - key: SENTRY_DSN
        sync: false
      - key: PYTHON_VERSION
        value: "3.13"
      - key: UVICORN_WORKERS
        value: "2"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com,nhrms-api-staging.onrender.com"
      - key: CORS_ORIGINS
        value: "http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173,https://nhrms-api-staging.onrender.com,https://nhrms-frontend-staging.onrender.com"
      - key: FRONTEND_URL
        value: "https://nhrms-frontend-staging.onrender.com"
      - key: ENVIRONMENT
        value: "staging"

  - type: worker
    name: nhrms-worker-staging
    runtime: python
    region: ohio
    plan: starter
    branch: develop
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m backend.app.worker_entry
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nhrms-db-staging
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "true"
      - key: REDIS_URL
        value: ""
      - key: PYTHON_VERSION
        value: "3.13"

  - type: web
    name: nhrms-frontend-staging
    runtime: static
    region: ohio
    plan: starter
    branch: develop
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: backend/static
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nhrms-api-staging.onrender.com
