databases:
  - name: nhrms-db
    databaseName: nhrms
    user: nhrms
    plan: free
    region: ohio
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: nhrms-api
    runtime: python
    region: ohio
    plan: starter
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: >
      alembic upgrade head &&
      uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT --workers ${UVICORN_WORKERS:-2} --limit-max-requests 10000 --timeout-keep-alive 65
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nhrms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DEBUG
        value: "false"
      - key: REDIS_URL
        value: "redis://redis:6379/0"
      - key: SENTRY_DSN
        sync: false
      - key: PYTHON_VERSION
        value: "3.13"
      - key: UVICORN_WORKERS
        value: "4"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"

  - type: worker
    name: nhrms-worker
    runtime: python
    region: ohio
    plan: starter
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m arq backend.app.worker.WorkerSettings
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nhrms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: REDIS_URL
        value: "redis://redis:6379/0"
      - key: PYTHON_VERSION
        value: "3.13"
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  - type: web
    name: nhrms-frontend
    runtime: static
    region: ohio
    plan: starter
    branch: main
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: backend/static
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nhrms-api.onrender.com
