x-common: &common
  env_file:
    - .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: nhrms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nhrms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nhrms_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nhrms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nhrms}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nhrms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nhrms-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nhrms}:${POSTGRES_PASSWORD:-nhrms_dev}@postgres:5432/${POSTGRES_DB:-nhrms}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
    <<: *common

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nhrms-worker
    command: python -m arq backend.app.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nhrms}:${POSTGRES_PASSWORD:-nhrms_dev}@postgres:5432/${POSTGRES_DB:-nhrms}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: "false"
    <<: *common

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nhrms-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    depends_on:
      - api

volumes:
  pgdata:
